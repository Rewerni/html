<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Link</title>
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="./assets/images/favicon.ico" type="image/x-icon">
<body>
    <main class="profile-card">
        <div class="profile-image">
        <img src="./assets/images/avatar-jessica.jpeg"
        alt="Foto de Perfil Jessica Randall">
            
        </div>

        <h1 class="profile-name">Jessica Randall</h1>

        <h2 class="profile-location">London, United Kingdom</h2>

        <p class="profile-bio">
            "Front-end developer and avid reader."
        </p>

        <nav>
            <ul class="profile-list">
                <li class="profile-item">
                    <a href="#">Github</a>
                </li>
                <li class="profile-item">
                    <a href="#">Frontend Mentor</a>
                </li>
                <li class="profile-item">
                    <a href="#">Linkedin</a>
                </li>
                <li class="profile-item">
                    <a href="#">Twitter</a>
                </li>
                
            </ul>
        </nav>
    </main>
</body>
</html>
